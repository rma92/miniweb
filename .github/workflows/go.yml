# This workflow will build a golang project for Linux, Windows, macOS, and OpenBSD

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Test
        run: go test -v ./...

  build:
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: app-linux-amd64

          - goos: linux
            goarch: arm64
            output: app-linux-arm64

          - goos: linux
            goarch: arm
            output: app-linux-arm

          - goos: windows
            goarch: amd64
            output: app-windows-amd64.exe

          - goos: darwin
            goarch: amd64
            output: app-darwin-amd64

          - goos: darwin
            goarch: arm64
            output: app-darwin-arm64

          - goos: openbsd
            goarch: amd64
            output: app-openbsd-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -v -o dist/${{ matrix.output }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
